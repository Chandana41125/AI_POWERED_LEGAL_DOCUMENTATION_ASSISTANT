{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Create Your Account</h2>
        <p class="auth-subtitle">Join LexiAI and simplify legal documents effortlessly</p>

        <form action="/signup" method="POST" class="auth-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter your full name" value="{{ full_name or '' }}" required />
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" value="{{ email or '' }}" required />
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required />
            </div>

            <button type="submit" class="btn primary-btn auth-btn">Signup</button>
        </form>

        <p class="switch-auth">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
